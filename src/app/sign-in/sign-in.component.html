<div class="container pb-4">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="sign-in-card card border-0 shadow-sm">
        <div class="card-body p-4 p-md-5">
          <p class="text-uppercase text-primary fw-semibold small mb-2">Blogger Box</p>
          <h1 class="mb-2">Sign in</h1>
          <p class="text-muted mb-4">Access your space to publish your posts.</p>

          <form [formGroup]="signInForm" (ngSubmit)="signIn()" autocomplete="off" novalidate>
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input
                id="email"
                class="form-control"
                [class.is-invalid]="email.invalid && (email.dirty || email.touched)"
                [class.is-valid]="email.valid && (email.dirty || email.touched)"
                type="email"
                formControlName="email"
                placeholder="nom@example.com"
              />

              <div class="invalid-feedback" *ngIf="email.errors?.['required']">
                Email is required.
              </div>
              <div class="invalid-feedback" *ngIf="email.errors?.['email']">
                Email must be valid.
              </div>
            </div>

            <div class="mb-4">
              <label for="password" class="form-label">Password</label>
              <input
                id="password"
                class="form-control"
                [class.is-invalid]="password.invalid && (password.dirty || password.touched)"
                [class.is-valid]="password.valid && (password.dirty || password.touched)"
                type="password"
                formControlName="password"
                placeholder="Your password"
              />

              <div class="invalid-feedback" *ngIf="password.errors?.['required']">
                Password is required.
              </div>
              <div class="invalid-feedback" *ngIf="password.errors?.['minlength']">
                Password must contain at least 8 characters.
              </div>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary" [disabled]="submitting">
                {{ submitting ? 'Signing in...' : 'Sign in' }}
              </button>
              <a routerLink="/" class="btn btn-outline-secondary">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
