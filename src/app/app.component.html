<div class="container py-4">
  <h1 class="text-center mb-4">Blogger Box</h1>

  <div *ngIf="errorMessage" class="alert alert-danger">
    {{ errorMessage }}
  </div>

  <div class="alert alert-info" *ngIf="loading">
    Chargement des posts...
  </div>

  <div class="alert alert-warning" *ngIf="!loading && !errorMessage && posts.length === 0">
    Aucun post trouve.
  </div>

  <div class="row" *ngIf="!loading && posts.length > 0">
    <div class="col-md-6 col-lg-4 mb-4" *ngFor="let post of posts">
      <div class="card h-100 shadow-sm">
        <div class="card-body">
          <h5 class="card-title">{{ post.title }}</h5>
          <p class="text-muted small">{{ post.createdAt | date:'mediumDate' }}</p>
          <p class="card-text">{{ post.content }}</p>
        </div>
      </div>
    </div>
  </div>
</div>
