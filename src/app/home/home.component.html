<div class="container pb-4">
  <section class="page-heading mb-4">
    <div>
      <p class="section-label mb-2">Blogger Box</p>
      <h1 class="fw-bold mb-2">All posts</h1>
      <p class="text-muted mb-0">The latest posts shared by the community.</p>
    </div>
    <img
      class="heading-image"
      src="https://images.unsplash.com/photo-1499750310107-5fef28a66643?auto=format&fit=crop&w=420&q=80"
      alt="Desk with a notebook and laptop"
    />
  </section>

  <div class="card border-0 shadow-sm filter-card mb-4">
    <div class="card-body">
      <div class="row g-3 align-items-end">
        <div class="col-md-4">
          <label for="searchValue" class="form-label">Search</label>
          <input
            id="searchValue"
            name="searchValue"
            class="form-control"
            [(ngModel)]="searchValue"
            placeholder="Search by title or content"
          />
        </div>

        <div class="col-md-3">
          <label for="categoryId" class="form-label">Category</label>
          <select
            id="categoryId"
            name="categoryId"
            class="form-select"
            [(ngModel)]="selectedCategoryId"
          >
            <option value="">All categories</option>
            <option *ngFor="let category of categories" [value]="category.id">
              {{ category.name }}
            </option>
          </select>
        </div>

        <div class="col-md-2">
          <label for="selectedDate" class="form-label">Date</label>
          <input
            id="selectedDate"
            name="selectedDate"
            class="form-control"
            type="date"
            [(ngModel)]="selectedDate"
          />
        </div>

        <div class="col-md-3 d-flex gap-2">
          <button class="btn btn-primary flex-fill" (click)="loadPosts()">Filter</button>
          <button class="btn btn-outline-secondary flex-fill" (click)="resetFilters()">Clear</button>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">
    {{ errorMessage }}
  </div>

  <div class="alert alert-info" *ngIf="loading">
    Loading posts...
  </div>

  <div class="alert alert-warning" *ngIf="!loading && !errorMessage && posts.length === 0">
    No posts found.
  </div>

  <div class="row" *ngIf="!loading && posts.length > 0">
    <div class="col-md-6 col-lg-4 mb-4" *ngFor="let post of posts">
      <div class="card h-100 border-0 shadow-sm post-card">
        <img
          class="post-image"
          [src]="'https://picsum.photos/seed/' + post.id + '/640/360'"
          [alt]="post.title"
        />
        <div class="card-body d-flex flex-column">
          <p class="text-muted small mb-2">{{ post.createdDate | date:'mediumDate' }}</p>
          <p class="text-primary small mb-2" *ngIf="post.category">{{ post.category.name }}</p>
          <h5 class="card-title">{{ post.title }}</h5>
          <p class="card-text flex-grow-1">{{ post.content }}</p>
          <div class="d-flex gap-2 mt-3">
            <a class="btn btn-primary" [routerLink]="['/posts', post.id]">
              Read post
            </a>
            <button
              type="button"
              class="btn btn-outline-danger"
              (click)="deletePost(post)"
              [disabled]="deletingPostId === post.id"
            >
              {{ deletingPostId === post.id ? 'Deleting...' : 'Delete' }}
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
